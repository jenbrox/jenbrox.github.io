<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Jentrak</title>
  <meta name="description" content="Sign in to your Jentrak expense tracker account.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6C63FF;
      --primary-hover: #5a52e0;
      --primary-light: rgba(108, 99, 255, 0.08);
      --bg: #f0f2f5;
      --surface: #ffffff;
      --text: #1a1d26;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 32px rgba(0,0,0,.08);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.12);
      --gradient-start: #6C63FF;
      --gradient-mid: #5B4CE0;
      --gradient-end: #3B1F8E;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --surface: #1a1d2e;
        --text: #f1f3f9;
        --text-muted: #9ca3af;
        --border: #2d3044;
        --error-bg: #2d1518;
        --shadow: 0 4px 32px rgba(0,0,0,.3);
        --shadow-lg: 0 20px 60px rgba(0,0,0,.4);
        --primary-light: rgba(108, 99, 255, 0.12);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: stretch;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── LAYOUT ── */
    .auth-wrapper {
      display: flex;
      width: 100%;
      min-height: 100dvh;
    }

    /* ── BRANDED PANEL ── */
    .brand-panel {
      flex: 1;
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 40%, var(--gradient-end) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      top: -100px;
      left: -100px;
    }

    .brand-panel::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      bottom: -80px;
      right: -60px;
    }

    .brand-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      max-width: 380px;
    }

    .brand-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      border: 1px solid rgba(255,255,255,.2);
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: .75rem;
    }

    .brand-tagline {
      font-size: 1.05rem;
      opacity: .85;
      line-height: 1.6;
      font-weight: 400;
    }

    .brand-features {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    .brand-feature {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .92rem;
      opacity: .9;
      text-align: left;
    }

    .brand-feature-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── FORM PANEL ── */
    .form-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.75rem 2.25rem;
      border: 1px solid var(--border);
    }

    .auth-logo-mobile {
      display: none;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-bottom: 1.75rem;
    }
    .auth-logo-mobile svg { flex-shrink: 0; }
    .auth-logo-mobile span { font-size: 1.35rem; font-weight: 700; color: var(--primary); }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: .5rem;
    }

    .auth-subtitle {
      color: var(--text-muted);
      font-size: .95rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      margin-bottom: .45rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .form-group input {
      width: 100%;
      padding: .8rem .9rem .8rem 2.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none;
    }
    .form-group input::placeholder { color: var(--text-muted); opacity: .6; }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(108,99,255,.12);
      background: var(--surface);
    }

    .form-error {
      display: none;
      background: var(--error-bg);
      color: var(--error);
      padding: .7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(239,68,68,.15);
    }
    .form-error.visible { display: flex; align-items: center; gap: .5rem; }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      margin-top: -.25rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .85rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .forgot-link {
      font-size: .85rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: opacity .2s;
    }
    .forgot-link:hover { opacity: .8; }

    .btn-primary {
      width: 100%;
      padding: .85rem 1rem;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, opacity .2s;
      box-shadow: 0 4px 14px rgba(108,99,255,.35);
      letter-spacing: .01em;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108,99,255,.4);
    }
    .btn-primary:active { transform: translateY(0) scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: .82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: .9rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 2.75rem; }
    .password-toggle {
      position: absolute; right: .7rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: .25rem; display: flex; align-items: center;
      transition: color .2s;
    }
    .password-toggle:hover { color: var(--primary); }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .brand-panel { display: none; }
      .auth-logo-mobile { display: flex; }
      .form-panel { padding: 1.5rem; }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
        box-shadow: none;
        border: none;
        background: var(--bg);
      }
      .form-panel { padding: 1rem; }
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card { animation: fadeUp .5s ease-out; }
    .brand-content { animation: fadeUp .6s ease-out .1s both; }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <!-- Branded side panel -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="5" width="20" height="14" rx="3" fill="white"/>
          <path d="M2 10h20" stroke="#6C63FF" stroke-width="1.5"/>
          <rect x="5" y="13" width="4" height="2" rx="1" fill="#6C63FF" opacity=".5"/>
        </svg>
      </div>
      <h2 class="brand-name">Jentrak</h2>
      <p class="brand-tagline">Take control of your finances with smart, effortless expense tracking.</p>

      <div class="brand-features">
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </div>
          <span>Real-time spending insights</span>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <span>Budget goals &amp; categories</span>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <span>Beautiful reports &amp; charts</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Form panel -->
  <div class="form-panel">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo-mobile">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="5" width="20" height="14" rx="3" fill="#6C63FF"/>
            <path d="M2 10h20" stroke="white" stroke-width="1.5"/>
            <rect x="5" y="13" width="4" height="2" rx="1" fill="white" opacity=".7"/>
          </svg>
          <span>Jentrak</span>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account to continue</p>

        <div id="form-error" class="form-error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <span id="form-error-text"></span>
        </div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper password-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter your password">
              <button type="button" class="password-toggle" aria-label="Toggle password visibility" onclick="togglePassword()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember-me"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="./signup.html">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('jentrak_token')) window.location.href = './index.html';

  // Track page view
  fetch('/api/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event: 'page_view', meta: { page: 'login' } }) }).catch(() => {});

  // Restore saved credentials
  const saved = JSON.parse(localStorage.getItem('jentrak_remember') || 'null');
  if (saved) {
    document.getElementById('email').value = saved.email || '';
    document.getElementById('password').value = saved.password || '';
    document.getElementById('remember-me').checked = true;
  }

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function handleAuthSuccess(data) {
    localStorage.setItem('jentrak_token', data.token);
    localStorage.setItem('jentrak_user', JSON.stringify(data.user));
    window.location.href = './index.html';
  }

  function showError(msg) {
    const el = document.getElementById('form-error');
    document.getElementById('form-error-text').textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('form-error').classList.remove('visible');
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember-me').checked;
    const btn = document.getElementById('submit-btn');

    if (!email || !password) { showError('Please fill in all fields.'); return; }

    // Save or clear remembered credentials
    if (remember) {
      localStorage.setItem('jentrak_remember', JSON.stringify({ email, password }));
    } else {
      localStorage.removeItem('jentrak_remember');
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Login failed.'); btn.disabled = false; btn.textContent = 'Sign In'; return; }
      handleAuthSuccess(data);
    } catch { showError('Network error. Please check your connection.'); btn.disabled = false; btn.textContent = 'Sign In'; }
  });

</script>

</body>
</html>
