<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.8)"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.3)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="950" cy="120" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1050" cy="80" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="530" r="180" fill="rgba(255,255,255,0.03)"/>
  <circle cx="80" cy="480" r="100" fill="rgba(255,255,255,0.02)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Bar chart icon (left decorative element) -->
  <g transform="translate(160, 240)">
    <rect x="0" y="80" width="28" height="70" rx="4" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="40" y="50" width="28" height="100" rx="4" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="80" y="20" width="28" height="130" rx="4" fill="url(#barGrad)" opacity="0.8"/>
    <rect x="120" y="40" width="28" height="110" rx="4" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="160" y="5" width="28" height="145" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <!-- Trend line over bars -->
    <polyline points="14,75 54,45 94,18 134,35 174,3" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="174" cy="3" r="5" fill="white" opacity="0.9"/>
  </g>

  <!-- Main title: Jentrak -->
  <text x="600" y="280" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">Jentrak</text>

  <!-- Divider line -->
  <rect x="480" y="310" width="240" height="3" rx="2" fill="url(#accentLine)"/>

  <!-- Subtitle -->
  <text x="600" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="4">Smart Expense Tracker</text>

  <!-- Dollar sign icon (right decorative element) -->
  <g transform="translate(940, 240)">
    <circle cx="50" cy="55" r="55" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="50" y="75" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">$</text>
  </g>

  <!-- Pie chart icon (far right decorative) -->
  <g transform="translate(1040, 200)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <path d="M30,30 L30,2 A28,28 0 0,1 54.2,44 Z" fill="rgba(255,255,255,0.12)"/>
    <path d="M30,30 L54.2,44 A28,28 0 0,1 10,49 Z" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="440" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="6">TRACK  ·  ANALYZE  ·  SAVE</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="rgba(255,255,255,0.3)"/>
</svg>